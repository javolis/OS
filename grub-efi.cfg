# GRUB config embedded in the standalone EFI loader (BOOTX64.EFI) for the
# UEFI disk image. Unlike the ISO, the kernel and initrd live as plain files
# on the FAT EFI System Partition, so we search for the partition that holds
# the kernel and set it as root, then force a graphics framebuffer and hand
# off via Multiboot (same kernel as the BIOS/ISO path).
insmod part_gpt
insmod fat
insmod all_video
insmod gfxterm
search --no-floppy --file --set=root /boot/kernel.elf
set gfxmode=1024x768x32,800x600x32,640x480x32,auto
set gfxpayload=keep
terminal_output gfxterm
multiboot /boot/kernel.elf
module /boot/initrd.tar
boot
