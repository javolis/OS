set default=0
set timeout=0

# Load every available video driver and keep whatever mode GRUB sets so a
# linear framebuffer is available to the kernel (the multiboot header
# requests one). This is also what lets it boot on UEFI machines that lack
# a legacy VGA text mode (e.g. Hyper-V Generation 2).
insmod all_video
set gfxpayload=keep

menuentry "OS" {
    multiboot /boot/kernel.elf
    module /boot/initrd.tar
    boot
}
