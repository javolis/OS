set default=0
set timeout=0

# Force a real graphics framebuffer for the kernel. Loading all video
# drivers and switching GRUB's own terminal to a graphics mode means GRUB
# is in linear-framebuffer mode at handoff and passes that surface to the
# multiboot kernel. Without this GRUB stays in text mode and hands over an
# EGA-text "framebuffer" (type 2) the kernel can't use as a pixel surface
# (it would fall back to VGA text, which is invisible on UEFI / Gen 2).
insmod all_video
insmod gfxterm
set gfxmode=1024x768x32,800x600x32,640x480x32,auto
set gfxpayload=keep
terminal_output gfxterm

menuentry "OS" {
    multiboot /boot/kernel.elf
    module /boot/initrd.tar
    boot
}
