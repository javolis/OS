name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          # grub-pc-bin = BIOS boot image; grub-efi-amd64-bin = UEFI boot
          # image (so the ISO boots on Gen 2 / UEFI VMs); ovmf = UEFI
          # firmware for the UEFI boot tests; gdisk = GPT partitioning and
          # qemu-utils = qemu-img (vhdx) for the Gen 2 disk image.
          # python3-pil + fonts-dejavu-core generate the anti-aliased UI font
          # (tools/genfont.py) at build time.
          sudo apt-get install -y nasm xorriso grub-pc-bin grub-efi-amd64-bin \
            grub-common mtools unzip qemu-system-x86 ovmf gdisk qemu-utils \
            python3-pil fonts-dejavu-core

      - name: Install i686-elf cross-compiler
        run: |
          curl -L -o toolchain.zip \
            https://github.com/lordmilko/i686-elf-tools/releases/latest/download/i686-elf-tools-linux.zip
          mkdir -p "$HOME/cross"
          unzip -q toolchain.zip -d "$HOME/cross"
          chmod +x "$HOME/cross/bin/"*
          echo "$HOME/cross/bin" >> "$GITHUB_PATH"

      - name: Show toolchain version
        run: i686-elf-gcc --version

      - name: Build kernel
        run: make

      - name: Build bootable ISO
        run: make iso

      - name: Smoke test (boot ISO in QEMU, BIOS)
        run: make test

      - name: UEFI boot test (boot ISO under OVMF)
        run: make test-uefi

      - name: Build UEFI disk image (Hyper-V Gen 2)
        run: make disk

      - name: UEFI disk boot test (boot os.img under OVMF as a hard disk)
        run: make test-disk

      - name: Build VHDX for Hyper-V Gen 2
        run: make vhdx

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-iso
          path: os.iso

      - name: Upload Gen 2 VHDX artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-vhdx
          path: os.vhdx
